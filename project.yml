name: Halcyon
options:
  bundleIdPrefix: com.743starlight
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

targets:
  Halcyon:
    type: application
    platform: macOS
    sources:
      - path: Halcyon
    resources:
      - path: Halcyon/Assets.xcassets
      - path: Halcyon/Resources/Fonts/Syne-Bold.ttf
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.743starlight.halcyon
        PRODUCT_NAME: Halcyon
        MARKETING_VERSION: "1.0.3"
        CURRENT_PROJECT_VERSION: "72229"
        INFOPLIST_FILE: Halcyon/Info.plist
        CODE_SIGN_ENTITLEMENTS: Halcyon/Halcyon.entitlements
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_APP_SANDBOX: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: true
